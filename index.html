 <!DOCTYPE html>
 <html lang="en">
 <head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Background Image</title>
 <link rel="preconnect" href="https://fonts.googleapis.com">
 <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
 <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
 <!-- Favicon -->
 <link rel="icon" type="image/png" href="favicon.png">
 <!-- Firebase SDKs (Add these) -->
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
 <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
 <style>
   /* Ensure html and body take full height */
   html, body {
     height: 100%;
     margin: 0;
     font-family: 'Poppins', sans-serif;
   }
 
   .background-container {
     /* Insert your image path here */
     position: relative; /* For positioning child elements */
     background-image: url('background.png');
 
     /* Ensure full height and width */
     height: 100%;
     width: 100%;
 
     /* Scales the image to cover fully */
     background-size: cover;
 
     /* Centers the image in the container */
     background-position: center;
 
     /* Prevents image repetition */
     background-repeat: no-repeat;
   }
 
   /* Style for content (Optional) */
   .content {
     color: white;
     text-align: center;
     padding-top: 50px;
   }

   /* Game Logo Style */
   .game-logo {
     position: absolute;
     top: 5px; /* Positioned at the very top */
     left: 50%;
     transform: translateX(-50%);
     width: 100px; /* Made smaller */
     z-index: 5;
     filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
     opacity: 0; /* Start invisible for animation */
     animation: fadeInLogo 1.5s ease-out 0.5s forwards; /* name duration timing-function delay fill-mode */
   }

   @keyframes fadeInLogo {
     to {
       opacity: 1;
     }
   }

   .tap-image {
     margin-top: 300px; /* Increased top margin */
     transition: transform 0.1s ease; /* For click animation */
     cursor: pointer; /* Changes cursor to pointer */
     max-width: 400px; /* Increased max width */
     width: 90%; /* Increased width relative to container */
   }

   .share-button {
     position: absolute;
     top: 20px;
     right: 20px;
     padding: 10px 20px;
     background: linear-gradient(45deg, #FFD700, #FFA500);
     color: white;
     border: none;
     border-radius: 10px;
     cursor: pointer;
     font-size: 16px;
     font-weight: bold;
     animation: pulse 2s infinite;
   }

   @keyframes pulse {
     0% {
       box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.7);
     }
     70% {
       box-shadow: 0 0 0 10px rgba(255, 215, 0, 0);
     }
     100% {
       box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
     }
   }

   .side-image {
     position: absolute;
     top: 90px; /* Top spacing */
     max-width: 140px; /* Increased max width */
     cursor: pointer;
     transition: transform 0.1s ease-in-out; /* For click animation */
   }

   .side-image:active {
     transform: scale(0.95); /* Shrink effect on click */
   }

   .daily-bonus-image {
     left: 20px; /* Left side */
     top: 90px; /* Moved up */
   }

   .spin-image {
     left: 20px;
     top: 180px; /* Moved up */
   }

   .special-offer-image {
     right: 20px; /* Right side */
     top: 70px; /* Moved up further */
   }

   .challenges-image {
     right: 20px;
     top: 170px; /* Moved down slightly */
   }

   .leaderboard-image {
     right: 20px;
     top: 260px; /* Moved down to maintain spacing */
   }

   .coin-counter {
     position: absolute;
     top: 25px;
     left: 20px; /* Shifted to side */
     transform: none;
     background: rgba(20, 20, 20, 0.85); /* Dark transparent background */
     backdrop-filter: blur(8px);
     color: #ffffff;
     padding: 8px 15px;
     border-radius: 15px;
     display: flex;
     align-items: center;
     border: 1px solid rgba(255, 215, 0, 0.3); /* Light gold border */
     box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
     z-index: 100;
     min-width: 120px;
     cursor: pointer; /* To make it clickable */
     transition: transform 0.2s ease;
     text-decoration: none; /* Remove link underline */
   }

   .coin-counter:active {
     transform: scale(0.97); /* Click feedback */
   }

   .wallet-icon {
     width: 32px;
     height: 32px;
     margin-right: 10px;
   }

   .balance-container {
     display: flex;
     flex-direction: column;
     line-height: 1.1;
   }

   .token-label {
     font-size: 10px;
     color: #aaa;
     text-transform: uppercase;
     letter-spacing: 0.5px;
     font-weight: 600;
   }

   #coin-count {
     font-size: 18px;
     font-weight: 700;
     color: #FFD700;
   }

   /* Coin animation style */
   @keyframes floatUp {
     0% { transform: translateY(0) scale(1); opacity: 1; }
     100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
   }

   .floating-text {
     position: absolute;
     color: #FFD700;
     font-weight: bold;
     font-size: 30px;
     pointer-events: none; /* Click through taaki fast click kar sakein */
     animation: floatUp 0.8s ease-out forwards;
     text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
     z-index: 999;
   }

   /* Energy Bar Styles */
   .energy-container {
     position: absolute;
     bottom: 30px;
     left: 50%;
     transform: translateX(-50%);
     width: 80%;
     max-width: 300px;
     text-align: center;
     z-index: 100;
   }

   .energy-text {
     color: #fff;
     font-weight: bold;
     font-size: 1.2em;
     margin-bottom: 5px;
     text-shadow: 1px 1px 2px #000;
   }

   .energy-bar-bg {
     width: 100%;
     height: 15px;
     background: rgba(0,0,0,0.5);
     border-radius: 10px;
     border: 2px solid #FFD700;
     overflow: hidden;
   }

   .energy-fill {
     height: 100%;
     background: linear-gradient(90deg, #f39c12, #e67e22);
     width: 100%; /* JS will control this */
     transition: width 0.2s linear;
   }

   /* Legal Link Style */
   .legal-link {
     position: absolute;
     bottom: 5px;
     left: 50%;
     transform: translateX(-50%);
     color: rgba(255, 255, 255, 0.5);
     font-size: 11px;
     text-decoration: none;
     z-index: 101;
   }
   .legal-link:hover { color: #FFD700; }

   /* Loading Screen Styles */
   #loading-screen {
     position: fixed;
     top: 0; left: 0; width: 100%; height: 100%;
     background: #000;
     z-index: 9999;
     display: flex;
     flex-direction: column;
     justify-content: center;
     align-items: center;
     transition: opacity 0.5s ease;
   }
   .loader {
     border: 5px solid #333;
     border-top: 5px solid #FFD700;
     border-radius: 50%;
     width: 50px; height: 50px;
     animation: spin 1s linear infinite;
     margin-bottom: 20px;
   }
   @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

   /* Modal Styles to make it centered like a Sign-up popup */
   .modal {
     position: fixed;
     top: 0; left: 0;
     width: 100%; height: 100%;
     background-color: rgba(0,0,0,0.85); /* Dark blur background */
     backdrop-filter: blur(8px);
     display: none; /* Hidden initially, JS sets to flex */
     justify-content: center;
     align-items: center;
     z-index: 10000;
   }
   .modal-content {
     background: #1a1a1a;
     padding: 25px;
     border-radius: 20px;
     width: 85%;
     max-width: 340px;
     text-align: center;
     box-shadow: 0 10px 30px rgba(0,0,0,0.8);
   }
   .modal-btn {
     padding: 12px;
     border-radius: 10px;
     border: none;
     font-weight: bold;
     font-size: 1.1em;
     margin-top: 15px;
     cursor: pointer;
   }
 </style>
 </head>
 <body>
 <!-- Loading Screen -->
 <div id="loading-screen">
   <div class="loader"></div>
   <p style="color: #FFD700; font-weight: bold;">Connecting to Server...</p>
 </div>
 
 <div class="background-container">
   <button class="share-button">Share</button>
   <a href="wallet.html" class="coin-counter">
     <img src="https://img.icons8.com/fluency/48/wallet.png" alt="Wallet" class="wallet-icon">
     <div class="balance-container">
       <span class="token-label">Dravexo Balance</span>
       <span id="coin-count">0</span>
     </div>
   </a>
   <a href="daily_bonus.html">
     <img src="daily-bonus.png" alt="Daily Bonus" class="side-image daily-bonus-image">
   </a>
   <a href="spin.html">
     <img src="lucky-spin.png" alt="Spin" class="side-image spin-image">
   </a>
   <a href="special_offer.html">
     <img src="special-offer.png" alt="Special Offer" class="side-image special-offer-image">
   </a>
   <a href="challenges.html">
     <img src="challenges.png" alt="Challenges" class="side-image challenges-image">
   </a>
   <a href="rank.html">
     <img src="leaderboard.jpeg" alt="Leaderboard" class="side-image leaderboard-image">
   </a>

   <div class="content">
     <img src="tap-to-earn.png" alt="Tap to Earn" class="tap-image" id="tap-to-earn-btn">
   </div>

   <div class="energy-container">
     <div class="energy-text">⚡ <span id="energy-val">500</span> / 500</div>
     <div class="energy-bar-bg">
       <div class="energy-fill" id="energy-bar-fill"></div>
     </div>
   </div>

   <!-- Legal / Info Link -->
   <a href="legal.html" class="legal-link">Terms & Info</a>

 </div>

 <!-- Beta Warning Modal -->
 <div id="betaWarningModal" class="modal">
   <div class="modal-content" style="border: 2px solid #ff4444;">
     <h2 style="color: #ff4444; margin-top: 0;">⚠️ IMPORTANT WARNING</h2>
     <div style="text-align: left; margin: 20px 10px; font-size: 1.1em; line-height: 1.6;">
        <p style="margin: 5px 0;">🚧 <strong>Game is in Beta Mode</strong></p>
        <p style="margin: 5px 0;">🛡️ <strong>Anti-Cheat is ACTIVE</strong></p>
        <p style="margin: 5px 0; color: #ff6b6b;">🚫 <strong>Suspicious activity = PERMANENT BAN</strong></p>
        <p style="margin: 5px 0; color: #4CAF50; font-size: 0.95em; font-weight: bold;">💾 Data Auto-Saves Every 5 Seconds</p>
     </div>
     
     <div style="margin: 15px 0; display: flex; align-items: center; gap: 10px; text-align: left;">
        <input type="checkbox" id="agree-checkbox" style="width: 20px; height: 20px; cursor: pointer;">
        <label for="agree-checkbox" style="font-size: 0.85em; color: #ccc; cursor: pointer;">
           I agree to the <a href="legal.html" target="_blank" style="color: #FFD700; text-decoration: underline;">Terms & Privacy Policy</a>
        </label>
     </div>
     <button class="modal-btn" id="beta-ok-btn" style="background: linear-gradient(45deg, #ff4444, #cc0000); color: white; width: 100%; opacity: 0.5; cursor: not-allowed;" disabled>I Understand</button>
   </div>
 </div>
 
 <script>
   // Selecting button elements
   const tapToEarnButton = document.getElementById('tap-to-earn-btn');
   const coinCountDisplay = document.getElementById('coin-count');
   const shareButton = document.querySelector('.share-button'); // This is now the Refer & Earn button
   const energyValDisplay = document.getElementById('energy-val');
   const energyBarFill = document.getElementById('energy-bar-fill');
   const loadingScreen = document.getElementById('loading-screen');
   const betaWarningModal = document.getElementById('betaWarningModal');
   const betaOkBtn = document.getElementById('beta-ok-btn');
   const agreeCheckbox = document.getElementById('agree-checkbox');
   
   // --- FIREBASE CONFIGURATION (START) ---
   // You need to paste your settings from Firebase Console here
   const firebaseConfig = {
       apiKey: "AIzaSyARA7kKshwUYXrN5iiLkmA-WsF0Re14YVA",
       authDomain: "dravexobot.firebaseapp.com",
       // Database URL automatically inferred from project ID
       databaseURL: "https://dravexobot-default-rtdb.firebaseio.com",
       projectId: "dravexobot",
       storageBucket: "dravexobot.firebasestorage.app",
       messagingSenderId: "771384217218",
       appId: "1:771384217218:web:117efa3a4b3216b70aae9b",
       measurementId: "G-14CZ1JE8PK"
   };

   // Firebase Initialize
   let db;
   let userRef;
   let functions;
   let score = 0;
   let energy = 500;
   let unsavedTaps = 0; // To batch tap updates
   let initialDataLoaded = false; // Flag to prevent race condition on save
   let lastTapTime = 0; // Anti-cheat rate limit
   let regenRate = 1; // Default regeneration rate
   let isFirstLoad = true; // Flag to show popup only once on connect
   let lastTapX = 0; // Anti-auto-clicker
   let lastTapY = 0;
   let sameSpotCount = 0;

   try {
       firebase.initializeApp(firebaseConfig);
       const auth = firebase.auth();
       db = firebase.database();
       functions = firebase.functions();
       
       auth.onAuthStateChanged((user) => {
           // गेम स्टार्ट होते ही लोडिंग स्क्रीन हटाकर वार्निंग दिखाएं
           if (isFirstLoad) {
               loadingScreen.style.opacity = '0';
               setTimeout(() => {
                   loadingScreen.style.display = 'none';
                   betaWarningModal.style.display = 'flex';
               }, 500);
               isFirstLoad = false;
           }

           if (user) {
               const userId = user.uid;
               // localStorage.setItem('userId', userId); // Removed insecure local storage dependency
               userRef = db.ref('users/' + userId);
               
               // Listen for data changes from Server
               userRef.on('value', (snapshot) => {
                   const data = snapshot.val();
                   if (data) {
                       if (data.isBanned) {
                           alert("Your account has been banned due to suspicious activity.");
                           window.location.reload(); 
                           return;
                       }
                       // Only take server score if we have no local changes
                       if (unsavedTaps === 0) {
                           score = data.score || 0;
                           coinCountDisplay.textContent = score.toLocaleString();
                       }
                       energy = data.energy !== undefined ? data.energy : MAX_ENERGY;
                       
                       // --- Calculate Boost from Referrals ---
                       const refCount = data.referralCount || 0;
                       const boostPercent = refCount * 0.05; // 5% per friend
                       regenRate = 1 * (1 + boostPercent);

                       updateEnergyUI(energy);

                       // --- SECURE SERVER-SIDE REFERRAL CHECK ---
                       if (!data.referredBy) {
                           const urlParams = new URLSearchParams(window.location.search);
                           const referralCode = urlParams.get('ref');
                           
                           // Ensure we don't call it if the code is the same as the user
                           if (referralCode && referralCode !== userId) {
                               const claimReferral = firebase.functions().httpsCallable('claimReferral');
                               claimReferral({ code: referralCode })
                                   .then(result => {
                                       if (result.data.success) {
                                           alert("Welcome! You received a 5,000 coin bonus for joining via referral!");
                                           window.history.replaceState({}, document.title, window.location.pathname);
                                       }
                                   })
                                   .catch(err => console.error("Referral Error:", err.message));
                           }
                       }
                   } else {
                       // This is a new user, data is "loaded"
                   }
                   // After the first snapshot is processed, we can consider the initial data loaded.
                   initialDataLoaded = true;
               });
           } else {
               // If not logged in, sign in anonymously
               auth.signInAnonymously().catch(console.error);
           }
       });
   } catch (error) {
       console.error("Firebase not connected. Replace config keys.", error);
   }
   // --- FIREBASE CONFIGURATION (END) ---

   // Checkbox listener to enable/disable the button
   agreeCheckbox.addEventListener('change', () => {
       if (agreeCheckbox.checked) {
           betaOkBtn.disabled = false;
           betaOkBtn.style.opacity = '1';
           betaOkBtn.style.cursor = 'pointer';
       } else {
           betaOkBtn.disabled = true;
           betaOkBtn.style.opacity = '0.5';
           betaOkBtn.style.cursor = 'not-allowed';
       }
   });

   // Handle Beta Warning Button
   betaOkBtn.addEventListener('click', () => {
       if (agreeCheckbox.checked) {
           betaWarningModal.style.display = 'none';
           sessionStorage.setItem('betaWarningSeen', 'true');
       }
   });

   // Energy System
   const MAX_ENERGY = 500;
   
   function updateEnergyUI(energy) {
     energyValDisplay.textContent = Math.floor(energy);
     energyBarFill.style.width = `${(energy / MAX_ENERGY) * 100}%`;
   }

   // Click event on Tap to Earn button
   tapToEarnButton.addEventListener('click', (e) => {
     const user = firebase.auth().currentUser;
     if (!user || !userRef) return;

     // Basic Rate Limiting (Anti-Cheat)
     const now = Date.now();
     if (now - lastTapTime < 70) return; // ~14 taps/sec max (Human limit)

     // Detect Static Auto-Clickers (Clicking same exact pixel)
     if (e.pageX === lastTapX && e.pageY === lastTapY) {
         sameSpotCount++;
         if (sameSpotCount > 15) return; // Ignore if more than 15 taps on same pixel
     } else {
         sameSpotCount = 0;
     }

     lastTapTime = now;
     lastTapX = e.pageX;
     lastTapY = e.pageY;

     // Local visual update for smoothness
     if (energy >= 1) {
         // 1. Update Local Variables
         energy -= 1;
         score += 5; // Tap Reward
         unsavedTaps += 1;

         // 2. Update UI Immediately
         coinCountDisplay.textContent = score.toLocaleString();
         updateEnergyUI(energy);
         showFloatingText(e, 5);
         animateTapButton();
     }
   });

   function showFloatingText(e, reward) {
     const floatingText = document.createElement('div');
     floatingText.textContent = `+${reward} 💰`;
     floatingText.classList.add('floating-text');
     floatingText.style.left = `${e.pageX}px`;
     floatingText.style.top = `${e.pageY}px`;
     document.body.appendChild(floatingText);
     setTimeout(() => { floatingText.remove(); }, 800);
   }

   function animateTapButton() {
     tapToEarnButton.style.transform = 'scale(0.95)';
     setTimeout(() => {
       tapToEarnButton.style.transform = 'scale(1)';
     }, 100);
   }

   // --- AUTO SAVE SYSTEM (every 15 seconds) ---
   // 1. Save function
   async function saveProgress() {
       if (!userRef || !initialDataLoaded) return; // Do not save until initial data is loaded
       if (unsavedTaps === 0) return; // Nothing to save

       const tapsToSend = unsavedTaps;
       unsavedTaps = 0; // Reset immediately to prevent double send

       try {
           // --- SECURE SERVER-SIDE SAVE ---
           const processTaps = firebase.functions().httpsCallable('processTaps');
           const result = await processTaps({ 
               taps: tapsToSend, 
               energySpent: tapsToSend 
           });

           if (result.data.success) {
               console.log("Progress synced with server.");
               // Optional: Re-sync local score with what server confirms if needed
           } else if (result.data.message) {
               alert(result.data.message);
           }
       } catch (err) {
           console.error("Save failed:", err.message);
           // Restore taps on error
           unsavedTaps += tapsToSend; 
       }
   }

   // 2. Auto-save every 3 seconds (Much faster)
   setInterval(saveProgress, 5000); // Changed to 5 seconds as requested

   // 3. Save immediately when user leaves the game or switches tabs
   window.addEventListener('visibilitychange', () => {
       if (document.visibilityState === 'hidden') {
           saveProgress();
       }
   });

   // Backup for closing the tab
   window.addEventListener('pagehide', saveProgress);

   // Click event on Share button
   shareButton.addEventListener('click', () => {
     window.location.href = 'friends.html';
   });

   // Energy Regeneration Loop (1 energy per second)
   setInterval(() => {
       if (energy < MAX_ENERGY) {
           energy += regenRate; // Use dynamic regen rate based on referrals
           if (energy > MAX_ENERGY) energy = MAX_ENERGY;
           updateEnergyUI(energy);
       }
   }, 1000);

 </script>
 </body>
 </html>
