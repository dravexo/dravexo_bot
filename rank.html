<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Poppins', sans-serif; color: white; }
        
        .background-container {
            background-image: url('background.png');
            height: 100%; width: 100%; background-size: cover;
            background-position: center; background-repeat: no-repeat;
            text-align: center; padding-top: 50px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center; overflow-y: auto;
        }
        
        h1 { font-size: 3em; font-weight: 700; color: #FFD700; text-shadow: 3px 3px 6px rgba(0,0,0,0.7); margin-bottom: 20px; }
        
        .leaderboard-list {
            width: 90%; max-width: 500px;
            background-color: rgba(0,0,0,0.6);
            border: 2px solid #FFD700;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .player-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .player-row:last-child { border-bottom: none; }
        
        .player-rank { width: 35px; font-weight: bold; font-size: 1.2em; color: #FFD700; }
        .player-name { flex-grow: 1; text-align: left; padding-left: 10px; font-weight: 600; }
        .player-score { font-weight: bold; color: #28a745; text-shadow: 0 0 5px rgba(40, 167, 69, 0.5); }

        .current-user {
            background-color: rgba(255, 215, 0, 0.2);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .back-button {
            padding: 10px 25px; border-radius: 10px; background: #6c757d;
            color: white; text-decoration: none; font-weight: bold; margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="background-container">
        <h1>Leaderboard</h1>
        <div class="leaderboard-list" id="leaderboard-list">
            <!-- Items generated by JS -->
        </div>
        <a href="index.html" class="back-button">Back to Game</a>
    </div>
    <script>
        const leaderboardList = document.getElementById('leaderboard-list');
        
        async function generateLeaderboard() {
            leaderboardList.innerHTML = '<p style="color:white;">Loading Top Players...</p>';
            
            try {
                const response = await fetch('https://us-central1-dravexobot.cloudfunctions.net/getLeaderboard');
                const data = await response.json();
                
                if (data.success) {
                    renderList(data.leaderboard);
                } else {
                    leaderboardList.innerHTML = '<p style="color:red;">Failed to load.</p>';
                }
            } catch (e) {
                console.error(e);
                leaderboardList.innerHTML = '<p style="color:red;">Network Error.</p>';
            }
        }
        
        function renderList(players) {
            leaderboardList.innerHTML = '';
            // Get current user ID from local storage just to highlight "You" if needed, 
            // but "You" highlighting logic is complex without auth on this page. 
            // For now, we show the global list.

            if (players.length === 0) {
                leaderboardList.innerHTML = '<p>No players yet.</p>';
                return;
            }

            players.forEach((player, index) => {
                const row = document.createElement('div');
                row.className = 'player-row';
                
                let rankDisplay = index + 1;
                if (index === 0) rankDisplay = '🥇';
                if (index === 1) rankDisplay = '🥈';
                if (index === 2) rankDisplay = '🥉';

                // Simple sanitization
                const safeName = player.name ? player.name.replace(/</g, "&lt;") : "Unknown";

                row.innerHTML = `
                    <div class="player-rank">${rankDisplay}</div>
                    <div class="player-name">${safeName}</div>
                    <div class="player-score">${(player.score || 0).toLocaleString()}</div>
                `;
                leaderboardList.appendChild(row);
            });
        }

        window.onload = generateLeaderboard;
    </script>
</body>
</html>
